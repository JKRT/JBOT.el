name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Emacs tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install --yes emacs-nox

      - name: Show Emacs version
        run: emacs --version

      - name: Byte compile without warnings
        run: >-
          emacs -Q --batch -L .
          --eval "(setq byte-compile-error-on-warn t)"
          -f batch-byte-compile jbot-agent.el jbot.el

      - name: Run ERT tests
        run: >-
          emacs -Q --batch -L . -L test
          -l test/jbot-agent-test.el
          -f ert-run-tests-batch-and-exit

      - name: Run Checkdoc
        run: >-
          emacs -Q --batch -L .
          --eval "(progn
          (require 'checkdoc)
          (checkdoc-file \"jbot-agent.el\")
          (checkdoc-file \"jbot.el\"))"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Git history with Gitleaks
        run: >-
          docker run --rm
          --volume "$PWD:/repo"
          --workdir /repo
          ghcr.io/gitleaks/gitleaks:v8.30.1
          git --redact --verbose .
